name: Auto Close Completed Issues

on:
  issues:
    types: [labeled]

jobs:
  close-completed:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue with completed label
        if: github.event.label.name == 'completed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
            console.log('Issue #' + context.issue.number + ' has been closed automatically due to "completed" label.');